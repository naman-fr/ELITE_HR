version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./ELITE_HR_Master_Dashboard.xlsx:/ELITE_HR_Master_Dashboard.xlsx

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
